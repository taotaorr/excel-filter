<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <style>
        body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0}
        .card{background:white;padding:50px 40px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3);width:100%;max-width:400px;text-align:center}
        h2{color:#333;margin:0 0 8px}
        .icon{width:60px;height:60px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
        .icon svg{width:28px;height:28px;stroke:white;fill:none;stroke-width:2}
        p{color:#999;font-size:14px;margin:0 0 30px}
        .error{background:#fef0f0;color:#f56c6c;padding:12px;border-radius:8px;margin-bottom:20px;text-align:left}
        input{width:100%;padding:12px 15px;border:1px solid #ddd;border-radius:10px;font-size:15px;margin-bottom:20px;box-sizing:border-box}
        input:focus{outline:none;border-color:#667eea}
        button{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:10px;color:white;font-size:16px;font-weight:600;cursor:pointer}
        button:hover{opacity:0.9}
        button:disabled{opacity:0.6;cursor:not-allowed}
        a{color:#667eea;text-decoration:none;margin-top:20px;display:block}
    </style>
</head>
<body>
    <div id="app">
        <div class="card">
            <div class="icon">
                <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <h2>管理后台</h2>
            <p>请输入账号密码登录</p>
            <div v-if="error" class="error" v-text="error"></div>
            <form @submit.prevent="handleLogin">
                <input type="text" v-model="username" placeholder="用户名" required>
                <input type="password" v-model="password" placeholder="密码" required>
                <button type="submit" :disabled="loading" v-text="loading ? '登录中...' : '登 录'"></button>
            </form>
            <a href="/">← 返回前台</a>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        Vue.createApp({
            data() {
                return {
                    username: '',
                    password: '',
                    loading: false,
                    error: ''
                }
            },
            methods: {
                async handleLogin() {
                    this.loading = true;
                    this.error = '';
                    
                    try {
                        const formData = new FormData();
                        formData.append('username', this.username);
                        formData.append('password', this.password);
                        
                        const res = await fetch('/admin/login', { method: 'POST', body: formData });
                        
                        if (res.redirected) {
                            window.location.href = res.url;
                        } else {
                            this.error = '用户名或密码错误';
                        }
                    } catch (e) {
                        this.error = '登录失败，请重试';
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
